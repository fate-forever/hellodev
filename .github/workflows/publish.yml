name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: verify and build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify exact tag and package versions
        run: python scripts/verify_release_version.py "${{ github.event.release.tag_name }}"
      - name: Run full release gate
        run: python scripts/verify.py --scope full
      - name: Install isolated build frontend
        run: python -m pip install build
      - name: Build wheel and source distribution once
        run: python -m build
      - name: Verify base wheel without optional dependencies
        run: |
          python -m venv smoke
          smoke/bin/python -m pip install --no-deps dist/*.whl
          smoke/bin/hellodev --version
      - name: Verify exact wheel with official MCP SDK over stdio
        run: |
          python -m venv mcp-smoke
          mcp-smoke/bin/python -m pip install "mcp==1.28.1"
          mcp-smoke/bin/python -m pip install --no-deps dist/*.whl
          mcp-smoke/bin/python scripts/mcp_smoke.py
      - name: Record artifact SHA-256 digests
        run: sha256sum dist/* | tee SHA256SUMS
      - name: Upload exact tested artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-artifacts-${{ github.event.release.tag_name }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            SHA256SUMS
          if-no-files-found: error
          retention-days: 30

  publish:
    name: trusted publish exact artifacts
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hellodev-core/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download exact tested artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-artifacts-${{ github.event.release.tag_name }}
          path: dist
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/dist/
