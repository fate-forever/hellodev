name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hellodev-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: fast / ${{ matrix.os }} / py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Verify fast suite
        run: python scripts/verify.py --scope fast

  full:
    name: full / ubuntu / py3.12
    needs: fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify full release gate
        run: python scripts/verify.py --scope full
      - name: Install declared wheel build backend
        run: python -m pip install "setuptools>=68"
      - name: Build wheel without dependencies
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist
      - name: Upload wheel candidate
        uses: actions/upload-artifact@v4
        with:
          name: hellodev-wheel-${{ github.sha }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  mcp:
    name: official MCP SDK / ubuntu / py3.12
    needs: fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional official MCP SDK extra
        run: python -m pip install ".[mcp]"
      - name: Verify official stdio MCP gateway
        run: python -m unittest tests.test_v13_gateway tests.test_v13_mcp -v
